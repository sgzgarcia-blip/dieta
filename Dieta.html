<!DOCTYPE html>
<html lang="es">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Dieta y Macros Dinámicos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 15px
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px
    }

    input,
    select,
    button {
      border-radius: 5px;  
      padding: 10px;
      font-size: 16px
    }

    .g0 {
      border: 2px solid;
    }

    .g1 {
      border: 2px solid #3498db;
    }

    .g2 {
      border: 2px solid #e01919;
    }


    button {
      background: #2c7be5;
      color: #fff;
      border: none;
      border-radius: 6px
    }

    .card {
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px
    }

    canvas {
      margin-top: 30px
    }

    .btn-loader {
      position: relative;
      padding: 10px 20px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .spinner {
      width: 10px;
      height: 10px;
      border: 3px solid #ddd;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍽 Dieta personalizada de #name# + 📊 Progreso</h1>

    <form id="form">
      <select class="g0" id="sexo" onchange="seleccionarOpcion(this.value)" title="Sexo">
        <option value="hombre">Hombre</option>
        <option value="mujer">Mujer</option>
      </select>
      <input class="g1" type="number" id="edad" placeholder="Edad" title="Edad" required>
      <input class="g1" type="number" id="peso" placeholder="Peso (kg)" title="Peso" required>
      <input class="g1" type="number" id="altura" placeholder="Altura (cm)" title="Altura" required>
      <select class="g1" id="actividad" title="Actividad">
        <option value="1.2">Sedentario</option>
        <option value="1.375">Ligero</option>
        <option value="1.55">Moderado</option>
        <option value="1.725">Alto</option>
      </select>
      <select class="g1" id="objetivo" title="Objetivos">
        <option value="definicion">Déficit</option>
        <option value="mantenimiento">Mantenimiento</option>
        <option value="volumen">Seperávit</option>
      </select>
      <input class="g2" type="number" id="cuello" placeholder="Cuello (cm)" title="Cuello" required>
      <input class="g2" type="number" id="cintura" placeholder="Cintura (cm)" title="Cintura" required>
      <input class="g2" type="hidden" id="cadera" placeholder="Cadera (cm)" title="Cadera" >
      <select class="g0" id="tipoD" title="Dietas" ></select>
      <button onclick="init()" class="btn-loader">
          <span class="texto">Calcular dieta</span>
          <div class="spinner" style="display:none;"></div>
      </button>
    </form>
    <div id="resultado"></div>
    <canvas id="chartG"></canvas>
    <canvas id="chartC"></canvas>
    <canvas id="chart"></canvas>
  </div>
  <script>

    const datos = localStorage.getItem("dietaDatos");
    let name = "Default";
    if (datos) {
      name = JSON.parse(datos).name;
    }
    const params = new URLSearchParams(location.search);
    name = params.get("name")?.trim() || name;

    const script = document.createElement('script');
    script.src = `./data/${name}.js`;
    script.async = false;
    document.head.appendChild(script);

    const icons = {
      "Desayuno": `🌅`,
      "Media mañana": `🕙`,
      "Comida": `🍽️`,
      "Merienda": `🕔`,
      "Cena": `🌙`
    };

    const porcentajes = [
      {"Comida": 1},
      {"Desayuno": 0.4, "Comida": 0.6},
      {"Desayuno": 0.4, "Comida": 0.5, "Cena": 0.2},
      {"Desayuno": 0.3, "Media mañana": 0.1, "Comida": 0.4, "Cena": 0.2},
      {"Desayuno": 0.3, "Comida": 0.4, "Merienda": 0.1,"Cena": 0.2},
      {"Desayuno": 0.25, "Media mañana": 0.1, "Comida": 0.35, "Merienda": 0.1,"Cena": 0.2}
    ];

    const sexoEl = document.getElementById("sexo");
    const edadEl = document.getElementById("edad");
    const pesoEl = document.getElementById("peso");
    const alturaEl = document.getElementById("altura");
    const cinturaEl = document.getElementById("cintura");
    const caderaEl = document.getElementById("cadera");
    const cuelloEl = document.getElementById("cuello");
    const actividadEl = document.getElementById("actividad");
    const objetivoEl = document.getElementById("objetivo");
    const tipoDEl = document.getElementById("tipoD");
    const resultado = document.getElementById("resultado");
    const ctxG = document.getElementById("chartG");
    const ctxC = document.getElementById("chartC");
    const ctx = document.getElementById("chart");
    const boton = form.querySelector(".btn-loader");
    const spinner = boton.querySelector(".spinner");
    let chartG,chartC,chart,antGCorporal, antPeso;

    document.querySelector('h1').textContent = document.querySelector('h1').textContent.replace("#name#", name);

    seleccionarOpcion(sexoEl.value);

    window.onload = function() {
      addOptionTipoD();;
      onloadCache();
    }

    // 📚 HISTORIAL
    const loadHistory = () => JSON.parse(localStorage.getItem("history")) || [];

    const saveHistory = (data) => {
      const history = loadHistory();
      history.push(data);
      localStorage.setItem("history", JSON.stringify(history.slice(-10)));
    };

    function init()  {
      loaderOn();
      setTimeout(() => {
        calcular();
        loaderOff();
      }, 50);
    }
    
    function loaderOn(){
      // Mostrar spinner y desactivar botón
      spinner.style.display = "inline-block";
      boton.disabled = true;
    }

    function loaderOff(){
      // Restaurar botón
      spinner.style.display = "none";
      boton.disabled = false;
    }

    function calcular() {

      const sexo = sexoEl.value;
      const edad = +edadEl.value;
      const peso = +pesoEl.value;
      const altura = +alturaEl.value;
      const cintura =+cinturaEl.value;
      const cadera =+ caderaEl.value
      const cuello = +cuelloEl.value;
      const actividad = +actividadEl.value;
      const objetivo = objetivoEl.value;
      const tipoD = tipoDEl.value;

      let tmb = sexo === "hombre"
        ? 10 * peso + 6.25 * altura - 5 * edad + 5
        : 10 * peso + 6.25 * altura - 5 * edad - 161;

      let calorias = tmb * actividad;

      if (objetivo === "definicion") calorias -= 400;
      if (objetivo === "volumen") calorias += 350;

      calorias = Math.round(calorias);

      const proteinas = Math.round(peso * (objetivo === "definicion" ? 2.2 : 1.8));
      const grasas = Math.round(peso * 0.9);
      const caloriasRestantes =
        calorias - (proteinas * 4 + grasas * 9);
      const carbos = Math.round(caloriasRestantes / 4);
      if (!alimentos.hasOwnProperty(tipoD)) return;
      const objetivos = {};
      let i = 0;
      while (Object.entries(alimentos[tipoD]).filter(([key]) => !porcentajes[i].hasOwnProperty(key)).length != 0) { i++; };
      Object.entries(alimentos[tipoD]).forEach(([key, value]) => {
            objetivos[key] = {
              kcal: Math.round(calorias * porcentajes[i][key]),
              prote: Math.round(proteinas * porcentajes[i][key]),
              carbs: Math.round(carbos * porcentajes[i][key]),
              grasa: Math.round(grasas * porcentajes[i][key])
            };
      });


    let resultD = {};
    let diet = "";
    let totalKcal = 0, totalProte = 0, totalCabs = 0, totalGrasa = 0; 
    Object.entries(alimentos[tipoD]).forEach(([key, value]) => {
      // 🍽 alimentos (aprox)
      let result = optimizadorFlexible(value, objetivos[key], obtenerPrioridades(objetivo));
      diet += `\n    ${icons[key]} <b>${key}</b>: \n${pintar(alimentos[tipoD][key], objetivos[key], result)}`;
      totalKcal += result.totales.kcal; totalProte += result.totales.prote; 
      totalCabs += result.totales.carbs; totalGrasa += result.totales.grasa;
    });
    diet += `\n\n\t<b>Suma de totales</b>: \n\t Calorías: ${Math.round(totalKcal)} ~ ${calorias} ${Math.round(totalKcal) == calorias ? "" : Math.round(totalKcal) > calorias ? "↑" : "↓"} kcal\n\t Proteínas: ${Math.round(totalProte)} ~ ${proteinas} ${Math.round(totalProte) == proteinas ? "" : Math.round(totalProte) > proteinas ? "↑" : "↓"} g\n\t Carbohidratos: ${Math.round(totalCabs)} ~ ${carbos} ${Math.round(totalCabs) == carbos ? "" : Math.round(totalCabs) > carbos ? "↑" : "↓"} g\n\t Grasas: ${Math.round(totalGrasa)} ~ ${grasas} ${Math.round(totalGrasa) == grasas ? "" : Math.round(totalGrasa) > grasas ? "↑" : "↓"} g`;

    const gCorporal = grasaCorporal(sexo, cintura, cadera, cuello,  altura);

    const result = `
    <h4>Objetivos en macronutrientes:</h4><pre>
    🔥 Calorías: ${calorias} kcal
    🥩 Proteínas: ${proteinas} g
    🍚 Carbohidratos: ${carbos} g
    🥑 Grasas: ${grasas} g
    </pre>
    <h4>% Grasa corporal:</h4><pre>
    🧍 % Grasa: ${gCorporal}
        ${pintaJSON(ajustePorGrasa({
              pesoAnterior: antPeso,
              grasaAnterior: antGCorporal,
              pesoActual: peso,
              grasaActual: gCorporal,
              kcalActuales: totalKcal
              }))}
    <hr></pre>
    <h4>Dieta:</h4><pre>
    \t${diet}
    <hr>
    🏋️ <b>Entrenamiento</b>
    \t${pintaJSON(planInteligente({
                      edad: edad,
                      peso: peso,
                      altura: altura,
                      kcalActuales: totalKcal,
                      factorActividad: actividad
                    }))}</pre>
    `;

      resultado.innerHTML = result;
      // 🔐 Guardar datos
      localStorage.setItem("dietaDatos", JSON.stringify({
        name, sexo, edad, peso, altura, cuello, cintura, cadera, actividad, objetivo, tipoD, result
      }));

      saveHistory({ date: new Date().toLocaleDateString(), gCorporal, totalKcal, totalProte, totalCabs, totalGrasa });
      drawChart();
      
    }

    function optimizadorFlexible(alimentos, objetivos, prioridad) {

      //const iteraciones = 6000;
      const learningRate = 0.01;

      let gramos = new Array(alimentos.length).fill(100);

      function calcularTotales(gs) {
        let kcal = 0, prote = 0, carbs = 0, grasa = 0;

        gs.forEach((g, i) => {
          kcal += g * alimentos[i].kcal / 100;
          prote += g * alimentos[i].proteina / 100;
          carbs += g * alimentos[i].carbs / 100;
          grasa += g * alimentos[i].grasa / 100;
        });

        return { kcal, prote, carbs, grasa };
      }

      function varianza(array) {
        const media = array.reduce((a, b) => a + b, 0) / array.length;
        return array.reduce((acc, val) =>
          acc + Math.pow(val - media, 2), 0) / array.length;
      }

      function coste(gs) {

        const t = calcularTotales(gs);

        return (
          Math.abs(t.kcal - objetivos.kcal) * prioridad.calorias +
          Math.abs(t.prote - objetivos.prote) * prioridad.proteina +
          Math.abs(t.carbs - objetivos.carbs) * prioridad.carbs +
          Math.abs(t.grasa - objetivos.grasa) * prioridad.grasa +
          varianza(gs) * prioridad.equilibrio
        );
      }

      let baseCoste = 1, antbaseCoste = -1;
      //for (let iter = 0; iter < iteraciones; iter++) {
      while ( baseCoste != antbaseCoste ) {
        
        antbaseCoste = baseCoste;
        baseCoste = coste(gramos);

        for (let i = 0; i < gramos.length; i++) {

          const copia = [...gramos];
          copia[i] += 1;

          const gradiente = coste(copia) - baseCoste;

          gramos[i] = alimentos[i].gramos ? alimentos[i].gramos : gramos[i] - learningRate * gradiente;
          //gramos[i] -= learningRate * gradiente;

          if (gramos[i] < 0) gramos[i] = 0;

        }
      }

      return {
        gramos: gramos.map(g => Math.round(g)),
        totales: calcularTotales(gramos)
      };
    }

    function obtenerPrioridades(modo) {

      switch (modo) {

        case "definicion":
          return {
            calorias: 3,
            proteina: 6,
            carbs: 4,
            grasa: 1,
            equilibrio: 0.002
          };

        case "volumen":
          return {
            calorias: 3,
            proteina: 3,
            carbs: 3,
            grasa: 1,
            equilibrio: 0.2
          };

        case "mantenimiento":
          return {
            calorias: 2,
            proteina: 2,
            carbs: 2,
            grasa: 2,
            equilibrio: 0.02
          };
      }
    }
    function pintar(alimentos, objetivos, result) {
      var paint = "";
      result.gramos.forEach((g, i) => {
        paint += `\t-${alimentos[i].nombre}: ${alimentos[i].gramos ? g : "<span style='color: red;'>" + g + "</span>"} g\n`;
      });
      paint += `\n\tTotales: \n\t calorías: ${Math.round(result.totales.kcal)} ~ ${Math.round(objetivos.kcal)} ${Math.round(result.totales.kcal) == Math.round(objetivos.kcal) ? "" : Math.round(result.totales.kcal) > Math.round(objetivos.kcal) ? "↑" : "↓"} kcal\n\t Proteínas: ${Math.round(result.totales.prote)} ~ ${Math.round(objetivos.prote)} ${Math.round(result.totales.prote) == Math.round(objetivos.prote) ? "" : Math.round(result.totales.prote) > Math.round(objetivos.prote) ? "↑" : "↓"} g\n\t Carbohidratos: ${Math.round(result.totales.carbs)} ~ ${Math.round(objetivos.carbs)} ${Math.round(result.totales.carbs) == Math.round(objetivos.carbs) ? "" : Math.round(result.totales.carbs) > Math.round(objetivos.carbs) ? "↑" : "↓"} g\n\t Grasas: ${Math.round(result.totales.grasa)} ~ ${Math.round(objetivos.grasa)} ${Math.round(result.totales.grasa) == Math.round(objetivos.grasa) ? "" : Math.round(result.totales.grasa) > Math.round(objetivos.grasa) ? "↑" : "↓"} g`;
      return paint;
    }

    function pintaJSON (resultadoEntreno, base = true) {
        let entreno = "";
        Object.entries(resultadoEntreno).forEach(([key, value]) => {
          // Entreno
          entreno = entreno + `\n        ${base?"-":"  "}${key}: ${typeof value === "object" ? pintaJSON(value, false) : value}`;
        });
        return entreno;
    }

    function drawChart() {
      const history = loadHistory();
      const labels = history.map(h => h.date);
      if (chartG) chartG.destroy();

      chartG = new Chart(ctxG, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "% Grasa corporal", data: history.map(h => h.gCorporal), borderWidth: 2 }
          ]
        },
        options: { responsive: true }
      });
      
      if (chartC) chartC.destroy();

      chartC = new Chart(ctxC, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Calorias", data: history.map(h => h.totalKcal), borderWidth: 2 }
          ]
        },
        options: { responsive: true }
      });

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "Proteína", data: history.map(h => h.totalProte), borderWidth: 2 },
            { label: "Carbos", data: history.map(h => h.totalCabs), borderWidth: 2 },
            { label: "Grasas", data: history.map(h => h.totalGrasa), borderWidth: 2 }
          ]
        },
        options: { responsive: true }
      });
    }

    function getRandomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function updateURL(name) {
      window.history.pushState({}, '', `${window.location.pathname}?name=${name || ''}`);
    }

    function addOptionTipoD() {
      var tSelect = document.getElementById("tipoD");
      for (let i = tSelect.options.length - 1; i >= 0; i--) {
        tSelect.remove(i);
      }
      if (alimentos) { 
        Object.entries(alimentos).forEach(([key, value]) => {
          var option = document.createElement("option");
          option.text = key;
          tSelect.add(option);
          tSelect.selectedIndex = 0;
        });
      }
  }

  function planInteligente({
  edad,
  peso,
  altura,
  kcalActuales,
  factorActividad
  }) {

    // 1️⃣ BMR base (Mifflin St Jeor)
    const bmrBase = (10 * peso) + (6.25 * altura) - (5 * edad) + 5;

    // 2️⃣ Ajuste metabólico progresivo por edad
    let ajusteEdad = 1;

    if (edad > 30) {
      const decadas = (edad - 30) / 10;
      ajusteEdad = 1 - (decadas * 0.01); // -1% por década
    }

    if (edad >= 50) ajusteEdad -= 0.02; // ajuste extra recuperación

    const bmrAjustado = bmrBase * ajusteEdad;

    const tdee = bmrAjustado * factorActividad;

    // 4️⃣ Fase calórica
    const diferencia = kcalActuales - tdee;
    let fase;
    let diasEntreno;
    if (diferencia < -300) {
      fase = "Definición";
      diasEntreno = 4;
    } else if (diferencia > 300) {
      fase = "Volumen";
      diasEntreno = 5;
    } else {
      fase = "Recomposición";
      diasEntreno = 4;
    }

    // 5️⃣ Ajuste entrenamiento por edad
    let volumenBase = 14;
    let intensidad = "8-12 reps";
    let frecuencia = 1;

    if (edad < 35) {
      volumenBase = 16;
      frecuencia = 1;
    }
    else if (edad < 50) {
      volumenBase = 14;
      frecuencia = 1.5;
    }
    else {
      volumenBase = 10;
      frecuencia = 2;
      intensidad = "8-12 + 12-15 reps";
    }

    // 6️⃣ Ajuste proteína dinámico
    let proteina = 2.0;

    if (edad >= 50) proteina = 2.3;
    else if (edad >= 40) proteina = 2.2;

    return {
      Edad: edad,
      BMR_Ajustado: Math.round(bmrAjustado),
      TDEE: Math.round(tdee),
      Fase: fase,
      Entrenamiento: {
        SeriesPorMusculoSemana: volumenBase,
        FrecuenciaRecomendada: frecuencia,
        RangoReps: intensidad,
        DiasFuerzaIdeales: diasEntreno >= 4 ? 4 : diasEntreno
      },
      Macros: {
        Proteina: Math.round(peso * proteina) + " g",
        Nota: "Aumentar la Proteína "
      }
    };
  }

  function ajustePorGrasa({
  pesoAnterior,
  grasaAnterior,
  pesoActual,
  grasaActual,
  kcalActuales
  }) {

    const masaMagraAnterior = pesoAnterior * (1 - grasaAnterior / 100);
    const masaMagraActual = pesoActual * (1 - grasaActual / 100);

    const masaGrasaAnterior = pesoAnterior * (grasaAnterior / 100);
    const masaGrasaActual = pesoActual * (grasaActual / 100);

    const cambioMagra = masaMagraActual - masaMagraAnterior;
    const cambioGrasa = masaGrasaActual - masaGrasaAnterior;

    let ajuste = 0;
    let recomendacion = "";

    if (cambioGrasa < 0 && cambioMagra >= 0) {
      recomendacion = "↑ Muscular ↓ Grasa";
    }
    else if (cambioMagra < 0) {
      ajuste = +150;
      recomendacion = "↓ Muscular ↑ kcal";
    }
    else if (cambioGrasa >= 0) {
      ajuste = -150;
      recomendacion = "↑ Grasa ↓ kcal";
    }

    return {
      CambioMasaMagra: cambioMagra.toFixed(2),
      CambioMasaGrasa: cambioGrasa.toFixed(2),
      NuevaKcal: Math.round( kcalActuales + ajuste ),
      Recomendar: recomendacion
    };
  }

  function grasaCorporal(sexo, cintura, cadera = cintura * 0.1, cuello, altura) {
    // Todas las medidas en cm
    const resultado = (sexo == "hombre" ? 495 / (
      1.0324
      - 0.19077 * Math.log10(cintura - cuello)
      + 0.15456 * Math.log10(altura)
    ) - 450 : 495 / (
      1.29579
      - 0.35004 * Math.log10(cintura + cadera - cuello)
      + 0.22100 * Math.log10(altura)
    ) - 450);

    return Number(resultado.toFixed(2));
  }

  function seleccionarOpcion(valor) {
    document.getElementById("cadera").type = (valor == "hombre" ? "hidden": "number");
  }

  function onloadCache() {
      const datos = localStorage.getItem("dietaDatos");
      if (!datos) return;

      const d = JSON.parse(datos);
      //Añadir un nuevo parámetro (ej. "name=")
      updateURL(d.name);
      sexoEl.value = d.sexo;
      seleccionarOpcion(d.sexo);
      edadEl.value = d.edad;
      pesoEl.value = d.peso;
      alturaEl.value = d.altura;
      cinturaEl.value = d.cintura;
      cuelloEl.value = d.cuello;
      caderaEl.value = d.cadera;
      actividadEl.value = d.actividad;
      objetivoEl.value = d.objetivo;
      antPeso = d.peso;
      antGCorporal = grasaCorporal(d.sexo, d.cintura, d.cadera, d.cuello,  d.altura);
      tipoDEl.value = d.tipoD;
      resultado.innerHTML = d.result;
    };

  drawChart();
  </script>
</body>

</html>
